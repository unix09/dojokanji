we<!DOCTYPE html>
<html lang="id">
<head>
  <script>
  (function() {
    // Alamat link utama dan cadangan Anda
    const NETLIFY_URL = "https://dojokanji.netlify.app"; // Sesuaikan jika nama situs Netlify Anda berbeda
    const GITHUB_URL  = "https://unix09.github.io/dojokanji/";

    // 1. Cek apakah pengguna saat ini sedang membuka lewat Netlify
    if (window.location.hostname.includes("netlify.app")) {
      
      // 2. Lakukan tes (ping) ke file index ini sendiri untuk mengecek status server
      fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
        .then(response => {
          // Jika server merespons dengan status error (seperti 402 Payment Required atau 502)
          // Berarti kuota bandwidth Netlify Anda sudah habis atau ditangguhkan
          if (response.status >= 400) {
            window.location.replace(GITHUB_URL);
          }
        })
        .catch(error => {
          // Jika koneksi gagal total/server tidak merespons sama sekali, langsung lempar ke GitHub
          window.location.replace(GITHUB_URL);
        });
    }
  })();
  </script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>道場 漢字 — JFT A2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
</style>
</head>
<body>
<div id="app">
  <!-- ===== MODE SELECTOR ===== -->
  <div id="s-mode" class="screen">
    <div class="screen-header" style="display:flex;align-items:center;gap:.5rem">
      <!-- FIX: Mengubah dari history.back() ke goToGroups() untuk navigasi yang benar -->
      <button onclick="goToGroups()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--ink2);padding:.1rem .3rem;border-radius:8px">‹</button>
      <div class="screen-title" id="mode-group-title" style="flex:1">Pilih Mode</div>
    </div>
    <div class="mode-section-label">Tap mode untuk langsung mulai</div>
    <div class="mode-grid">
      <div class="mode-card" data-mode="mc-read" onclick="selectMode(this)">
        <div class="mode-icon">🔤</div>
        <div class="mode-title">Tebak Bacaan</div>
        <div class="mode-desc">Pilih cara baca hiragana yang benar</div>
      </div>
      <div class="mode-card" data-mode="mc-mean" onclick="selectMode(this)">
        <div class="mode-icon">💡</div>
        <div class="mode-title">Tebak Arti</div>
        <div class="mode-desc">Pilih arti kanji yang tepat</div>
      </div>
      <div class="mode-card" data-mode="flashcard" onclick="selectMode(this)">
        <div class="mode-icon">🃏</div>
        <div class="mode-title">Flashcard</div>
        <div class="mode-desc">Tap kartu untuk balik & nilai sendiri</div>
      </div>
      <div class="mode-card" data-mode="hafal" onclick="selectMode(this)">
        <div class="mode-icon">⚡</div>
        <div class="mode-title">Hafal Cepat</div>
        <div class="mode-desc">Mode cepat dengan timer untuk menghafal</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== NAVIGATION HELPER FUNCTIONS ===== */

/**
 * Fungsi goToGroups(): Navigasi ke screen groups (Folder)
 * Digunakan untuk tombol back di screen Mode Selector
 * Memastikan navigasi tetap di struktur folder, bukan menggunakan browser history
 * 
 * PERUBAHAN:
 * - Sebelumnya menggunakan: onclick="history.back()"
 * - Sekarang menggunakan: onclick="goToGroups()"
 * 
 * ALASAN:
 * history.back() akan kembali ke browser history, yang mungkin melewati folder
 * dan langsung ke beranda jika user melakukan navigasi cepat.
 * Dengan goToGroups(), navigasi tetap mengikuti struktur app.
 */
function goToGroups() {
  go('s-groups');
}

/**
 * Fungsi goToStories(): Navigasi ke screen stories (Cerita)
 * Digunakan untuk tombol back di screen Story Read
 * Memastikan navigasi tetap di struktur aplikasi
 */
function goToStories() {
  go('s-stories');
}
/**
 * Fungsi go(): Mengubah screen dan mencatat riwayat ke browser
 * Ini mencegah tombol back HP langsung melompat ke beranda/keluar aplikasi
 */
function go(screenId) {
  const screens = document.querySelectorAll('.screen');
  screens.forEach(s => s.classList.remove('active'));
  
  const target = document.getElementById(screenId);
  if (target) {
    target.classList.add('active');
    
    // CATATAN PENTING: Daftarkan perpindahan screen ke history browser
    // Jadi saat tombol back HP ditekan, browser tahu harus mundur ke screen mana
    history.pushState({ screenId: screenId }, '', `#${screenId}`);
  }
}

/**
 * Handle ketika tombol BACK FISIK / GESTURE HP ditekan oleh user
 */
window.onpopstate = function(event) {
  if (event.state && event.state.screenId) {
    // Jika ada riwayat screen sebelumnya, tampilkan screen tersebut
    const screens = document.querySelectorAll('.screen');
    screens.forEach(s => s.classList.remove('active'));
    
    const target = document.getElementById(event.state.screenId);
    if (target) target.classList.add('active');
  } else {
    // Jika riwayat habis, default kembali ke halaman utama daftar kanji
    const screens = document.querySelectorAll('.screen');
    screens.forEach(s => s.classList.remove('active'));
    
    const defaultScreen = document.getElementById('s-groups'); // Sesuaikan ID daftar kanji kamu
    if (defaultScreen) defaultScreen.classList.add('active');
  }
};

</body>
</html>
